<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="18" fill="#231f20"/>
  <!-- Horizontal connections -->
  <line x1="20" y1="20" x2="50" y2="20" stroke="#3fd1b8" stroke-width="13" stroke-linecap="round"/>
  <line x1="50" y1="20" x2="80" y2="20" stroke="#3fd1b8" stroke-width="13" stroke-linecap="round"/>
  <line x1="20" y1="50" x2="50" y2="50" stroke="#3fd1b8" stroke-width="13" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="80" y2="50" stroke="#3fd1b8" stroke-width="13" stroke-linecap="round"/>
  <line x1="20" y1="80" x2="50" y2="80" stroke="#3fd1b8" stroke-width="13" stroke-linecap="round"/>
  <line x1="50" y1="80" x2="80" y2="80" stroke="#3fd1b8" stroke-width="13" stroke-linecap="round"/>
  <!-- S-curve connections -->
  <path d="M 50 20 C 50 35, 20 35, 20 50" stroke="#3fd1b8" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M 80 20 C 80 35, 50 35, 50 50" stroke="#3fd1b8" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M 50 50 C 50 65, 20 65, 20 80" stroke="#3fd1b8" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M 80 50 C 80 65, 50 65, 50 80" stroke="#3fd1b8" stroke-width="13" stroke-linecap="round" fill="none"/>
  <!-- 9 dots -->
  <circle cx="20" cy="20" r="13" fill="#3fd1b8"/>
  <circle cx="50" cy="20" r="13" fill="#3fd1b8"/>
  <circle cx="80" cy="20" r="13" fill="#3fd1b8"/>
  <circle cx="20" cy="50" r="13" fill="#3fd1b8"/>
  <circle cx="50" cy="50" r="13" fill="#3fd1b8"/>
  <circle cx="80" cy="50" r="13" fill="#3fd1b8"/>
  <circle cx="20" cy="80" r="13" fill="#3fd1b8"/>
  <circle cx="50" cy="80" r="13" fill="#3fd1b8"/>
  <circle cx="80" cy="80" r="13" fill="#3fd1b8"/>
</svg>
